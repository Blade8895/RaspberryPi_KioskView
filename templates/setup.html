<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Plan Setup</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/setup.css') }}">
</head>
<body>
<main class="container">
  <h1>/plansetup</h1>
  <form method="post" id="setupForm">
    <section class="card">
      <h2>Allgemein</h2>
      <label>Freigabelink<input type="url" id="share_link" name="share_link" value="{{ settings.share_link }}"></label>
      <button type="button" id="reloadFilesBtn">Dateien laden</button>
      <label>Datei auswählen
        <select id="selected_file" name="selected_file">
          <option value="">-- bitte wählen --</option>
          {% for f in files %}<option value="{{ f }}" {% if f == settings.selected_file %}selected{% endif %}>{{ f }}</option>{% endfor %}
        </select>
      </label>
      <div class="grid-2">
        <label>Refresh (Sek.)<input type="number" name="refresh_interval_sec" min="30" value="{{ settings.refresh_interval_sec }}"></label>
        <label>Font/Zoom<input type="number" name="font_scale" step="0.1" min="0.6" max="3.0" value="{{ settings.font_scale }}"></label>
      </div>
      <label class="toggle"><input type="checkbox" name="show_grid" {% if settings.show_grid %}checked{% endif %}>Grid anzeigen</label>
      <label>Titel<input type="text" name="title" value="{{ settings.title }}"></label>
    </section>

    <section class="card">
      <h2>Views</h2>
      <div id="viewsContainer"></div>
      <button type="button" id="addViewBtn">+ View hinzufügen</button>
    </section>

    <input type="hidden" id="views_json" name="views_json">
    <button class="save" type="submit">Speichern</button>
  </form>
</main>
<script>window.INIT_VIEWS = {{ settings.views|tojson }};</script>
<script src="{{ url_for('static', filename='js/setup.js') }}"></script>
</body>
</html>
